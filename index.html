
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatsong — Rising Tracks Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0714; --bg-panel: #160c22; --purple: #9b59b6; --ink: #f2eafc; --ink-dim: #9a89ac; --line: rgba(155,89,182,0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', sans-serif; padding: 40px 20px; min-height: 100vh; }
        .wrap { max-width: 1080px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .tile { background: var(--bg-panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .tile:hover { transform: translateY(-5px); border-color: var(--purple); }
        .img-wrapper { width: 100%; aspect-ratio: 16/9; background: #2a1b3d; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .meta { padding: 15px; }
        .track { font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { font-size: 12px; color: var(--ink-dim); }
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal-bg.open { display: flex; }
        .modal { background: var(--bg-panel); padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
        .submit-bar { margin-bottom: 30px; padding: 20px; background: var(--bg-panel); border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--purple); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Rising Tracks <span>Gallery</span></h1>
        <div class="submit-bar">
            <p>Deel je track met de community.</p>
            <button class="btn" id="openSubmit">+ Submit</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <button id="modalClose" style="float:right; cursor:pointer;">✕</button>
            <h2 id="modalTrack" style="margin-bottom:15px;"></h2>
            <div id="modalEmbed"></div>
        </div>
    </div>

    <div class="modal-bg" id="submitBg">
        <div class="modal">
            <button id="submitClose" style="float:right; cursor:pointer;">✕</button>
            <form id="submitForm">
                <input type="text" id="fArtist" placeholder="Artiest" required style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="text" id="fTrackName" placeholder="Track Naam" required style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="url" id="fTrackUrl" placeholder="Link (Spotify/SoundCloud/YT)" required style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" class="btn" style="width:100%;">Toevoegen</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160", authDomain: "chatsong-track-gallery.firebaseapp.com", projectId: "chatsong-track-gallery", storageBucket: "chatsong-track-gallery.firebasestorage.app", messagingSenderId: "800320909638", appId: "1:800320909638:web:36cb0f043699c5ef767547" }));

        function getEmbedHtml(url) {
            if (url.includes('spotify')) return `<iframe src="https://open.spotify.com/embed/track/${url.split('/').pop().split('?')[0]}" width="100%" height="300" frameborder="0"></iframe>`;
            if (url.includes('soundcloud')) return `<iframe src="https://w.soundcloud.com/player/?url=${url}" width="100%" height="200" frameborder="no"></iframe>`;
            return `<iframe src="https://www.youtube.com/embed/${url.includes('youtu.be') ? url.split('/').pop() : url.split('v=')[1]}" width="100%" height="300" frameborder="0"></iframe>`;
        }

        onSnapshot(query(collection(db, 'tracks'), orderBy('likes', 'desc')), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            snap.forEach((doc) => {
                const t = doc.data();
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = `
                    <div class="img-wrapper" id="img-${doc.id}">Laden...</div>
                    <div class="meta">
                        <div class="track">${t.track}</div>
                        <div class="artist">${t.artist}</div>
                    </div>`;
                grid.appendChild(tile);

                // Fetch automatisch preview via Microlink
                fetch(`https://api.microlink.io?url=${encodeURIComponent(t.trackUrl)}`)
                    .then(r => r.json())
                    .then(d => {
                        if(d.data.image) document.getElementById(`img-${doc.id}`).innerHTML = `<img src="${d.data.image.url}">`;
                    });

                tile.onclick = () => {
                    document.getElementById('modalTrack').textContent = t.track;
                    document.getElementById('modalEmbed').innerHTML = getEmbedHtml(t.trackUrl);
                    document.getElementById('modalBg').classList.add('open');
                };
            });
        });

        document.getElementById('submitForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'tracks'), {
                artist: document.getElementById('fArtist').value,
                track: document.getElementById('fTrackName').value,
                trackUrl: document.getElementById('fTrackUrl').value,
                likes: 0
            });
            document.getElementById('submitBg').classList.remove('open');
            document.getElementById('submitForm').reset();
        };

        document.getElementById('openSubmit').onclick = () => document.getElementById('submitBg').classList.add('open');
        document.getElementById('modalClose').onclick = () => document.getElementById('modalBg').classList.remove('open');
        document.getElementById('submitClose').onclick = () => document.getElementById('submitBg').classList.remove('open');
    </script>
</body>
</html>
