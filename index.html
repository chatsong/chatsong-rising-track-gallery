<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatsong — Rising Tracks Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0714; --bg-panel: #160c22; --purple: #9b59b6; --purple-glow: #b877d4; --ink: #f2eafc; --ink-dim: #9a89ac; --line: rgba(155,89,182,0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.18), transparent), var(--bg); color: var(--ink); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; padding: 48px 20px 80px; }
        .wrap { max-width: 1080px; margin: 0 auto; }
        header { margin-bottom: 44px; }
        h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 700; margin-bottom: 10px; }
        h1 span { color: var(--purple-glow); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
        .tile { position: relative; background: var(--bg-panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .tile:hover { border-color: var(--purple); box-shadow: 0 0 10px rgba(155,89,182,0.3); }
        .embed-wrapper { width: 100%; aspect-ratio: 1/1; background-color: var(--bg); pointer-events: none; overflow: hidden; }
        .embed-wrapper iframe { width: 100%; height: 100%; border: none; }
        .meta { padding: 12px 14px 14px; }
        .track { font-size: 14.5px; font-weight: 700; margin-bottom: 2px; }
        .artist { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 10px; }
        .like-btn { background: transparent; border: 1px solid var(--line); color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 6px 10px; border-radius: 20px; cursor: pointer; }
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(8,4,13,0.85); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index: 50; padding: 20px; }
        .modal-bg.open { display: flex; }
        .modal { background: var(--bg-panel); border: 1px solid var(--purple); border-radius: 14px; max-width: 420px; width: 100%; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--ink-dim); font-size: 20px; cursor: pointer; }
        .embed-container { width: 100%; height: 300px; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        .submit-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding: 16px 18px; background: var(--bg-panel); border: 1px solid var(--line); border-radius: 10px; }
        .btn-primary { background: var(--purple); color: #fff; border: none; padding: 11px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .field { margin-bottom: 14px; }
        .field label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--ink-dim); }
        .field input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--ink); padding: 10px 12px; border-radius: 7px; }
    </style>
</head>
<body>
    <div class="wrap">
        <header><h1>Rising Tracks <span>Gallery</span></h1></header>
        <div class="submit-bar">
            <p>Submit your track.</p>
            <button class="btn-primary" id="openSubmit">+ Submit</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <h2 id="modalTrack" style="font-size:20px;"></h2>
            <div id="modalEmbed" class="embed-container"></div>
        </div>
    </div>

    <div class="modal-bg" id="submitBg">
        <div class="modal">
            <button class="modal-close" id="submitClose">✕</button>
            <h2>Submit Track</h2>
            <form id="submitForm" style="margin-top:20px;">
                <div class="field"><label>Artiest</label><input type="text" id="fArtist" required></div>
                <div class="field"><label>Track Naam</label><input type="text" id="fTrackName" required></div>
                <div class="field"><label>Track URL</label><input type="url" id="fTrackUrl" required></div>
                <button type="submit" class="btn-primary" style="width:100%;">Toevoegen</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160", authDomain: "chatsong-track-gallery.firebaseapp.com", projectId: "chatsong-track-gallery", storageBucket: "chatsong-track-gallery.firebasestorage.app", messagingSenderId: "800320909638", appId: "1:800320909638:web:36cb0f043699c5ef767547" }));

        function getEmbedHtml(url) {
            if (url.includes('spotify.com')) {
                const id = url.split('/').pop().split('?')[0];
                return `<iframe src="https://open.spotify.com/embed/track/${id}" width="100%" height="100%"></iframe>`;
            }
            if (url.includes('soundcloud.com')) {
                return `<iframe src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}" width="100%" height="100%"></iframe>`;
            }
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const id = url.includes('youtu.be') ? url.split('/').pop() : url.split('v=')[1].split('&')[0];
                return `<iframe src="https://www.youtube.com/embed/${id}" width="100%" height="100%"></iframe>`;
            }
            return '<div style="padding:20px; text-align:center;">Geen preview</div>';
        }

        onSnapshot(query(collection(db, 'tracks'), orderBy('likes', 'desc')), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            snap.forEach((doc) => {
                const t = { id: doc.id, ...doc.data() };
                const html = getEmbedHtml(t.trackUrl);
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = `
                    <div class="embed-wrapper">${html}</div>
                    <div class="meta">
                        <div class="track">${t.track}</div>
                        <div class="artist">${t.artist}</div>
                        <button class="like-btn">♥ ${t.likes || 0}</button>
                    </div>`;
                tile.onclick = () => {
                    document.getElementById('modalTrack').textContent = t.track;
                    document.getElementById('modalEmbed').innerHTML = html;
                    document.getElementById('modalBg').classList.add('open');
                };
                grid.appendChild(tile);
            });
        });

        document.getElementById('submitForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'tracks'), {
                artist: document.getElementById('fArtist').value,
                track: document.getElementById('fTrackName').value,
                trackUrl: document.getElementById('fTrackUrl').value,
                likes: 0
            });
            document.getElementById('submitBg').classList.remove('open');
            document.getElementById('submitForm').reset();
        };

        document.getElementById('modalClose').onclick = () => document.getElementById('modalBg').classList.remove('open');
        document.getElementById('openSubmit').onclick = () => document.getElementById('submitBg').classList.add('open');
        document.getElementById('submitClose').onclick = () => document.getElementById('submitBg').classList.remove('open');
    </script>
</body>
</html>
