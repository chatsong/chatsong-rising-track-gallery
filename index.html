
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatsong — Rising Tracks Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #08040d; --bg-panel: #120a1c; --purple: #9b59b6; 
    --purple-glow: #d682ff; --magenta: #ff2e88; --ink: #f2eafc; 
    --ink-dim: #9a89ac; --line: rgba(155,89,182,0.2); 
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background: radial-gradient(circle at 50% -20%, rgba(255,46,136,0.15), rgba(155,89,182,0.1), transparent), var(--bg); color:var(--ink); font-family:'Space Grotesk', sans-serif; min-height:100vh; padding:60px 20px 100px; }
  .wrap{ max-width:1200px; margin:0 auto; }
  
  header{ margin-bottom:56px; text-align: center; }
  h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
  h1 span{ color: transparent; -webkit-text-stroke: 1px var(--purple-glow); background: linear-gradient(135deg, var(--purple-glow), var(--magenta)); -webkit-background-clip: text; background-clip: text; }
  
  .workflow-steps { color: var(--ink-dim); font-size: 1.15rem; font-weight: 400; max-width: 650px; margin: 0 auto; line-height: 1.5; }
  .workflow-steps span { color: var(--purple-glow); font-weight: 500; }
  .workflow-steps strong { color: var(--magenta); font-weight: 500; }

  /* Grid configuration */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:28px; }
  
  .tile{ background:var(--bg-panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .tile:hover{ transform:translateY(-8px); border-color:var(--purple-glow); box-shadow: 0 12px 32px rgba(155,89,182,0.25); }
  
  /* Top element: Artist Showcase Card */
  .tile-showcase { padding:24px; background: linear-gradient(to bottom, rgba(155,89,182,0.05), transparent); flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; }
  .track-meta { min-width: 0; }
  .tile-title { font-size:1.3rem; font-weight:700; line-height: 1.2; margin-bottom: 6px; color: #fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tile-artist { font-size:0.95rem; color:var(--purple-glow); font-weight: 500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  
  /* Action row (Upvote + Chat) */
  .tile-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 8px; }
  
  /* Interactive Upvote Button */
  .upvote-btn { display: flex; align-items: center; gap: 6px; background: rgba(255,46,136,0.1); border: 1px solid rgba(255,46,136,0.3); color: var(--magenta); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; user-select: none; }
  .upvote-btn:hover { background: rgba(255,46,136,0.25); transform: scale(1.05); }
  .upvote-btn:active { transform: scale(0.95); }
  .upvote-btn.voted { background: var(--magenta); color: #fff; border-color: var(--magenta); cursor: default; transform: none; }
  
  .chatsong-btn { font-family:'JetBrains Mono', monospace; font-size:12px; color:#fff; background: var(--purple); text-decoration:none; padding: 6px 14px; border-radius:8px; font-weight: 500; transition: background 0.2s; white-space: nowrap; }
  .chatsong-btn:hover { background: var(--purple-glow); }

  /* Compact embed container at the bottom */
  .embed-container { width:100%; background:rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Rising Tracks <span>Showcase</span></h1>
    <p class="workflow-steps">
      <strong>Vote</strong> for your favorite artist and track, then <span>join the community</span> to write a reply!
    </p>
  </header>
  <div class="grid" id="grid"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160",
    authDomain: "chatsong-track-gallery.firebaseapp.com",
    projectId: "chatsong-track-gallery",
    storageBucket: "chatsong-track-gallery.firebasestorage.app",
    messagingSenderId: "800320909638",
    appId: "1:800320909638:web:36cb0f043699c5ef767547"
  });
  const db = getFirestore(app);

  let votedTracks = JSON.parse(localStorage.getItem('chatsong_voted_tracks')) || [];

  function getEmbedHtml(url) {
    if (!url) return '<div style="padding:16px; color:var(--ink-dim); font-size:13px;">No link available</div>';
    
    if (url.includes('spotify.com')) {
        const cleanUrl = url.split('?')[0].replace('spotify.com/', 'spotify.com/embed/');
        return `<iframe src="${cleanUrl}" width="100%" height="80" frameborder="0" allow="encrypted-media" style="border:0; display:block;"></iframe>`;
    }
    
    if (url.includes('soundcloud.com')) {
        return `<iframe width="100%" height="20" scrolling="no" frameborder="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%239b59b6&auto_play=false&inverse=true&style=compact" style="border:0; display:block; height:30px; margin: 10px 0;"></iframe>`;
    }
    
    if (url.includes('youtu')) {
        let id = '';
        if (url.includes('v=')) { id = url.split('v=')[1].split('&')[0]; } else { id = url.split('/').pop().split('?')[0]; }
        return `<iframe width="100%" height="160" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="border:0; display:block;"></iframe>`;
    }

    if (url.includes('mixcloud.com')) {
        const path = url.split('mixcloud.com')[1].split('?')[0];
        return `<iframe width="100%" height="60" src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&light=0&feed=${encodeURIComponent(path)}" frameborder="0" style="border:0; display:block;"></iframe>`;
    }
    
    return `<div style="padding:16px; text-align:center;"><a href="${url}" target="_blank" style="color:var(--purple-glow); font-size:13px; text-decoration: none;">Listen to Track ↗</a></div>`;
  }

  window.upvoteTrack = async function(trackId, buttonElement) {
    if (votedTracks.includes(trackId)) return;

    try {
      const trackRef = doc(db, 'tracks', trackId);
      await updateDoc(trackRef, {
        likes: increment(1)
      });

      votedTracks.push(trackId);
      localStorage.setItem('chatsong_voted_tracks', JSON.stringify(votedTracks));
      
      buttonElement.classList.add('voted');
      buttonElement.innerHTML = `✓ VOTED`;
    } catch (error) {
      console.error("Error upvoting track: ", error);
    }
  };

  onSnapshot(query(collection(db, 'tracks'), orderBy('likes', 'desc')), (snapshot) => {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    if (snapshot.docs.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--ink-dim); padding:40px;">No tracks available at the moment.</div>';
      return;
    }

    snapshot.docs.forEach((doc) => {
      const t = { id: doc.id, ...doc.data() };
      const tile = document.createElement('div');
      tile.className = 'tile';
      
      const likeCount = t.likes !== undefined ? t.likes : 0;
      const hasVoted = votedTracks.includes(t.id);
      
      // Dynamic text styling for singular vs plural upvotes
      const upvoteText = likeCount === 1 ? 'UPVOTE' : 'UPVOTES';

      tile.innerHTML = `
        <div class="tile-showcase">
            <div class="track-meta">
                <div class="tile-title" title="${escapeHtml(t.track)}">${escapeHtml(t.track)}</div>
                <div class="tile-artist" title="${escapeHtml(t.artist)}">by ${escapeHtml(t.artist || 'Unknown Artist')}</div>
            </div>
            
            <div class="tile-actions">
                <button 
                  class="upvote-btn ${hasVoted ? 'voted' : ''}" 
                  onclick="upvoteTrack('${t.id}', this)">
                  ${hasVoted ? '✓ VOTED' : `🔥 ${likeCount} ${upvoteText}`}
                </button>
                ${t.topicUrl ? `<a href="${t.topicUrl}" target="_blank" class="chatsong-btn" title="Join the conversation and write a reply">Write Reply</a>` : ''}
            </div>
        </div>
        <div class="embed-container">
            ${getEmbedHtml(t.trackUrl)}
        </div>
      `;
      
      grid.appendChild(tile);
    });
  });

  function escapeHtml(str){
    return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
