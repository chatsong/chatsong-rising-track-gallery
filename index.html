<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatsong — Rising Tracks Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #0d0714; --bg-panel: #160c22; --purple: #9b59b6; 
    --purple-glow: #b877d4; --magenta: #ff2e88; --ink: #f2eafc; 
    --ink-dim: #9a89ac; --line: rgba(155,89,182,0.25); 
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.18), transparent), var(--bg); color:var(--ink); font-family:'Space Grotesk', sans-serif; min-height:100vh; padding:48px 20px 80px; }
  .wrap{ max-width:1200px; margin:0 auto; }
  header{ margin-bottom:44px; }
  h1 span{ color:var(--purple-glow); }
  
  /* Grid ingericht op embedded spelers */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:24px; }
  .tile{ background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; transition:border-color 0.2s; }
  .tile:hover{ border-color:var(--purple); }
  
  .tile-info { padding:16px; border-bottom:1px solid rgba(155,89,182,0.15); display:flex; justify-content:between; align-items:center; gap:10px; }
  .tile-text { flex-grow: 1; min-width: 0; }
  .tile-title { font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tile-artist { font-size:12px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  
  .chatsong-btn { font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--purple-glow); text-decoration:none; padding:4px 8px; border:1px solid rgba(155,89,182,0.4); border-radius:4px; white-space:nowrap; }
  .chatsong-btn:hover { background:rgba(155,89,182,0.1); border-color:var(--purple-glow); }

  .embed-container { width:100%; min-height:120px; background:rgba(0,0,0,0.15); display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Rising Tracks <span>Gallery</span></h1>
  </header>
  <div class="grid" id="grid"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160",
    authDomain: "chatsong-track-gallery.firebaseapp.com",
    projectId: "chatsong-track-gallery",
    storageBucket: "chatsong-track-gallery.firebasestorage.app",
    messagingSenderId: "800320909638",
    appId: "1:800320909638:web:36cb0f043699c5ef767547"
  });
  const db = getFirestore(app);

  // Synchronisatie van de standaard platforms (Spotify, SoundCloud, YouTube, Mixcloud)
  function getEmbedHtml(url, containerId) {
    if (!url) return '<div style="padding:20px; color:var(--ink-dim);">Geen link beschikbaar</div>';
    
    // 1. Spotify
    if (url.includes('spotify.com')) {
        const cleanUrl = url.split('?')[0].replace('spotify.com/', 'spotify.com/embed/');
        return `<iframe src="${cleanUrl}" width="100%" height="152" frameborder="0" allow="encrypted-media" style="border:0; display:block;"></iframe>`;
    }
    
    // 2. SoundCloud
    if (url.includes('soundcloud.com')) {
        return `<iframe width="100%" height="152" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%239b59b6&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false" style="border:0; display:block;"></iframe>`;
    }
    
    // 3. YouTube
    if (url.includes('youtu')) {
        let id = '';
        if (url.includes('v=')) {
            id = url.split('v=')[1].split('&')[0];
        } else {
            id = url.split('/').pop().split('?')[0];
        }
        return `<iframe width="100%" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border:0; display:block;"></iframe>`;
    }

    // 4. Mixcloud
    if (url.includes('mixcloud.com')) {
        const path = url.split('mixcloud.com')[1].split('?')[0];
        return `<iframe width="100%" height="120" src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&light=0&feed=${encodeURIComponent(path)}" frameborder="0" style="border:0; display:block;"></iframe>`;
    }

    // 5. Bandcamp (Maakt gebruik van asynchrone oEmbed afhandeling hieronder)
    if (url.includes('bandcamp.com')) {
        fetchBandcampEmbed(url, containerId);
        return `<div style="padding:20px; color:var(--ink-dim); font-size:13px;">Speler laden...</div>`;
    }
    
    return `<div style="padding:24px; text-align:center;"><a href="${url}" target="_blank" style="color:var(--purple-glow); font-size:14px;">Beluister op externe website ↗</a></div>`;
  }

  // Speciale functie om Bandcamp embeds dynamisch op te halen via hun oEmbed endpoint
  async function fetchBandcampEmbed(url, containerId) {
    try {
      const response = await fetch(`https://bandcamp.com/developer/oembed?url=${encodeURIComponent(url)}&format=json`);
      if (!response.ok) throw new Error();
      const data = await response.json();
      
      const container = document.getElementById(containerId);
      if (container && data.html) {
        // Pas de styling aan zodat de iframe van Bandcamp mooi binnen onze styling past
        let embedCode = data.html
          .replace('width="400"', 'width="100%"')
          .replace('height="400"', 'height="152"')
          .replace('height: 400px;', 'height: 152px;');
        container.innerHTML = embedCode;
      }
    } catch (e) {
      const container = document.getElementById(containerId);
      if (container) {
        container.innerHTML = `<div style="padding:24px; text-align:center;"><a href="${url}" target="_blank" style="color:var(--purple-glow); font-size:14px;">Beluister op Bandcamp ↗</a></div>`;
      }
    }
  }

  // Live tracks ophalen uit Firestore en direct in de grid laden
  onSnapshot(query(collection(db, 'tracks'), orderBy('likes', 'desc')), (snapshot) => {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    if (snapshot.docs.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--ink-dim); padding:40px;">Er zijn nog geen goedgekeurde tracks om te tonen.</div>';
      return;
    }

    snapshot.docs.forEach((doc, index) => {
      const t = { id: doc.id, ...doc.data() };
      const tile = document.createElement('div');
      tile.className = 'tile';
      const containerId = `embed-${index}`;
      
      tile.innerHTML = `
        <div class="tile-info">
            <div class="tile-text">
                <div class="tile-title" title="${escapeHtml(t.track)}">${escapeHtml(t.track)}</div>
                <div class="tile-artist" title="${escapeHtml(t.artist)}">${escapeHtml(t.artist || 'Onbekend')}</div>
            </div>
            ${t.topicUrl ? `<a href="${t.topicUrl}" target="_blank" class="chatsong-btn">Chat ↗</a>` : ''}
        </div>
        <div class="embed-container" id="${containerId}">
            ${getEmbedHtml(t.trackUrl, containerId)}
        </div>
      `;
      
      grid.appendChild(tile);
    });
  });

  function escapeHtml(str){
    return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
