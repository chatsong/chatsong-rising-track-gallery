<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatsong — Rising Tracks Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg: #0d0714; --bg-panel: #160c22; --purple: #9b59b6; --purple-glow: #b877d4; --magenta: #ff2e88; --amber: #ffb84d; --ink: #f2eafc; --ink-dim: #9a89ac; --line: rgba(155,89,182,0.25); }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.18), transparent), var(--bg); color:var(--ink); font-family:'Space Grotesk', sans-serif; min-height:100vh; padding:48px 20px 80px; }
  .wrap{ max-width:1080px; margin:0 auto; }
  header{ margin-bottom:44px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:18px; }
  .tile{ position:relative; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; }
  .modal-bg{ display:none; position:fixed; inset:0; background:rgba(8,4,13,0.85); backdrop-filter:blur(6px); align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal-bg.open{ display:flex; }
  .modal{ background:var(--bg-panel); border:1px solid var(--purple); border-radius:14px; max-width:420px; width:100%; padding:24px; position:relative; }
  .modal-close{ position:absolute; top:14px; right:14px; background:none; border:none; color:white; cursor:pointer; font-size:20px; }
  /* Embed styling */
  .embed-container { width:100%; margin-top:20px; border-radius:8px; overflow:hidden; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Rising Tracks <span>Gallery</span></h1>
  </header>
  <div class="grid" id="grid"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalTrack"></h2>
    <div id="modalEmbed" class="embed-container"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160",
    authDomain: "chatsong-track-gallery.firebaseapp.com",
    projectId: "chatsong-track-gallery",
    storageBucket: "chatsong-track-gallery.firebasestorage.app",
    messagingSenderId: "800320909638",
    appId: "1:800320909638:web:36cb0f043699c5ef767547"
  });
  const db = getFirestore(app);

  // Logica om de juiste embed te genereren
  function getEmbedHtml(url) {
    if (!url) return '';
    if (url.includes('spotify.com/track/')) {
        const id = url.split('/track/')[1].split('?')[0];
        return `<iframe src="https://open.spotify.com/embed/track/${id}" width="100%" height="152" frameborder="0" allow="encrypted-media"></iframe>`;
    }
    if (url.includes('soundcloud.com')) {
        return `<iframe width="100%" height="160" scrolling="no" frameborder="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}"></iframe>`;
    }
    if (url.includes('youtu')) {
        const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        return `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
    }
    return `<a href="${url}" target="_blank" style="color:var(--purple-glow)">Open track in browser</a>`;
  }

  // Grid laden
  onSnapshot(query(collection(db, 'tracks'), orderBy('likes', 'desc')), (snapshot) => {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    snapshot.docs.forEach(doc => {
      const t = { id: doc.id, ...doc.data() };
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = `<div style="padding:20px;"><h3>${t.track}</h3><p>${t.artist}</p></div>`;
      tile.onclick = () => {
        document.getElementById('modalTrack').textContent = t.track;
        document.getElementById('modalEmbed').innerHTML = getEmbedHtml(t.trackUrl);
        document.getElementById('modalBg').classList.add('open');
      };
      grid.appendChild(tile);
    });
  });

  document.getElementById('modalClose').onclick = () => document.getElementById('modalBg').classList.remove('open');
</script>
</body>
</html>
