<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatsong Gallery — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg: #0d0714; --bg-panel: #160c22; --purple: #9b59b6; --purple-glow: #b877d4; --magenta: #ff2e88; --amber: #ffb84d; --ink: #f2eafc; --ink-dim: #9a89ac; --line: rgba(155,89,182,0.25); }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.18), transparent), var(--bg); color:var(--ink); font-family:'Space Grotesk', sans-serif; min-height:100vh; padding:48px 20px 80px; }
  .wrap{ max-width:760px; margin:0 auto; }
  header{ margin-bottom:32px; }
  .eyebrow{ font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--magenta); margin-bottom:12px; }
  h1{ font-size:clamp(24px,5vw,34px); font-weight:700; letter-spacing:-0.02em; }
  h1 span{ color:var(--purple-glow); }
  .signin-box{ background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; padding:40px 32px; text-align:center; margin-top:60px; }
  .signin-box p{ color:var(--ink-dim); font-size:14px; margin-bottom:24px; }
  .google-btn{ display:inline-flex; align-items:center; gap:10px; background:#fff; color:#1f1f1f; border:none; font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14px; padding:12px 22px; border-radius:8px; cursor:pointer; }
  .user-bar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:28px; padding:12px 16px; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; font-size:13px; color:var(--ink-dim); }
  .signout{ background:none; border:1px solid var(--line); color:var(--ink-dim); font-family:'JetBrains Mono', monospace; font-size:11px; padding:6px 12px; border-radius:6px; cursor:pointer; }
  .sub-card{ background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin-bottom:16px; }
  .artist{ font-size:16px; font-weight:700; margin-bottom:4px; }
  .meta-line{ font-family:'JetBrains Mono', monospace; font-size:11.5px; color:var(--ink-dim); word-break:break-all; margin-bottom:2px; }
  .meta-line a{ color:var(--purple-glow); text-decoration:none; }
  .approve-fields{ display:grid; grid-template-columns:2fr 1fr; gap:10px; margin:16px 0 14px; }
  .approve-fields input, .approve-fields select{ width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--line); color:var(--ink); font-family:'Space Grotesk', sans-serif; font-size:13.5px; padding:9px 11px; border-radius:7px; outline:none; }
  .btn-approve{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:13px; border:none; padding:10px 16px; border-radius:7px; cursor:pointer; background:var(--purple); color:#fff; }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--amber); color:#1f1300; font-weight:700; font-size:13px; padding:10px 18px; border-radius:8px; display:none; }
  [hidden]{ display:none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Chatsong · Rising Tracks Gallery</div>
    <h1>Submission <span>Review</span></h1>
  </header>
  <div id="signinView"><div class="signin-box"><p>Sign in with your Google account.</p><button class="google-btn" id="googleSignIn">Sign in with Google</button></div></div>
  <div id="adminView" hidden>
    <div class="user-bar"><span id="userEmail"></span><button class="signout" id="signOutBtn">Sign out</button></div>
    <div id="subsList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160", authDomain: "chatsong-track-gallery.firebaseapp.com", projectId: "chatsong-track-gallery", storageBucket: "chatsong-track-gallery.firebasestorage.app", messagingSenderId: "800320909638", appId: "1:800320909638:web:36cb0f043699c5ef767547" };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  document.getElementById('googleSignIn').addEventListener('click', () => signInWithPopup(auth, provider));
  document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if (!user) { document.getElementById('signinView').hidden = false; document.getElementById('adminView').hidden = true; return; }
    document.getElementById('userEmail').textContent = user.email;
    const q = query(collection(db, 'submissions'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
      document.getElementById('signinView').hidden = true;
      document.getElementById('adminView').hidden = false;
      renderSubs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  });

  function renderSubs(subs) {
    const list = document.getElementById('subsList');
    list.innerHTML = subs.length === 0 ? '<div class="empty-state">Nothing pending.</div>' : '';
    subs.forEach(s => {
      const card = document.createElement('div');
      card.className = 'sub-card';
      card.innerHTML = `
        <div class="artist">${escapeHtml(s.artist)}</div>
        <div class="meta-line">track: <a href="${s.trackUrl}" target="_blank">${s.trackUrl}</a></div>
        <div class="approve-fields">
          <input type="text" placeholder="Leave empty for Artist Name" class="f-title">
          <select class="f-platform">
            <option value="Spotify">Spotify</option><option value="SoundCloud">SoundCloud</option><option value="Bandcamp">Bandcamp</option>
          </select>
        </div>
        <button class="btn-approve">✓ Approve</button>
      `;
      card.querySelector('.btn-approve').addEventListener('click', async (e) => {
        e.target.disabled = true; e.target.textContent = 'Approving…';
        try {
          await addDoc(collection(db, 'tracks'), {
            artist: s.artist,
            track: card.querySelector('.f-title').value.trim() || s.artist,
            platform: card.querySelector('.f-platform').value,
            trackUrl: s.trackUrl,
            topicUrl: s.topicUrl,
            emoji: '🎵',
            likes: 0,
            createdAt: new Date()
          });
          await deleteDoc(doc(db, 'submissions', s.id));
          showToast('Approved!');
        } catch (err) { alert(err.message); }
      });
      list.appendChild(card);
    });
  }

  function showToast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2600); }
  function escapeHtml(str){ return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
