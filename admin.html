<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatsong Gallery — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0714;
    --bg-panel: #160c22;
    --purple: #9b59b6;
    --purple-glow: #b877d4;
    --magenta: #ff2e88;
    --amber: #ffb84d;
    --ink: #f2eafc;
    --ink-dim: #9a89ac;
    --line: rgba(155,89,182,0.25);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.18), transparent), var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    padding:48px 20px 80px;
  }
  .wrap{ max-width:760px; margin:0 auto; }

  header{ margin-bottom:32px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.15em;
    text-transform:uppercase; color:var(--magenta); margin-bottom:12px;
  }
  h1{ font-size:clamp(24px,5vw,34px); font-weight:700; letter-spacing:-0.02em; }
  h1 span{ color:var(--purple-glow); }

  .signin-box{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
    padding:40px 32px; text-align:center; margin-top:60px;
  }
  .signin-box p{ color:var(--ink-dim); font-size:14px; margin-bottom:24px; }
  .google-btn{
    display:inline-flex; align-items:center; gap:10px;
    background:#fff; color:#1f1f1f; border:none;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14px;
    padding:12px 22px; border-radius:8px; cursor:pointer;
  }
  .google-btn:hover{ background:#f2f2f2; }

  .denied-box{
    background:rgba(255,46,136,0.08); border:1px solid rgba(255,46,136,0.35);
    border-radius:10px; padding:20px; margin-top:24px; font-size:13.5px; color:var(--ink);
    display:none;
  }

  .user-bar{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin-bottom:28px; padding:12px 16px;
    background:var(--bg-panel); border:1px solid var(--line); border-radius:10px;
    font-size:13px; color:var(--ink-dim);
  }
  .user-bar .signout{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    font-family:'JetBrains Mono', monospace; font-size:11px;
    padding:6px 12px; border-radius:6px; cursor:pointer;
  }
  .user-bar .signout:hover{ border-color:var(--magenta); color:var(--magenta); }

  .empty-state{ color:var(--ink-dim); font-size:14px; text-align:center; padding:60px 20px; }

  .sub-card{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
    padding:20px 22px; margin-bottom:16px;
  }
  .sub-card .artist{ font-size:16px; font-weight:700; margin-bottom:4px; }
  .sub-card .meta-line{
    font-family:'JetBrains Mono', monospace; font-size:11.5px; color:var(--ink-dim);
    word-break:break-all; margin-bottom:2px;
  }
  .sub-card .meta-line a{ color:var(--purple-glow); text-decoration:none; }
  .sub-card .meta-line a:hover{ text-decoration:underline; }

  .approve-fields{
    display:grid; grid-template-columns:2fr 1fr; gap:10px;
    margin:16px 0 14px;
  }
  .approve-fields input, .approve-fields select{
    width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--line);
    color:var(--ink); font-family:'Space Grotesk', sans-serif; font-size:13.5px;
    padding:9px 11px; border-radius:7px; outline:none;
  }
  .approve-fields input:focus, .approve-fields select:focus{ border-color:var(--purple); }

  .card-actions{ display:flex; gap:10px; }
  .btn-approve, .btn-reject{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:13px;
    border:none; padding:10px 16px; border-radius:7px; cursor:pointer;
  }
  .btn-approve{ background:var(--purple); color:#fff; }
  .btn-approve:hover{ background:var(--purple-glow); }
  .btn-approve:disabled{ opacity:0.5; cursor:default; }
  .btn-reject{ background:transparent; border:1px solid var(--line); color:var(--ink-dim); }
  .btn-reject:hover{ border-color:var(--magenta); color:var(--magenta); }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--amber); color:#1f1300; font-weight:700; font-size:13px;
    padding:10px 18px; border-radius:8px; display:none;
  }

  [hidden]{ display:none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Chatsong · Rising Tracks Gallery</div>
    <h1>Submission <span>Review</span></h1>
  </header>

  <div id="signinView">
    <div class="signin-box">
      <p>Sign in with the Google account tied to your Chatsong admin access.</p>
      <button class="google-btn" id="googleSignIn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.8 2.73v2.27h2.92c1.7-1.57 2.68-3.88 2.68-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.27c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.34C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.97 10.7c-.18-.54-.28-1.11-.28-1.7s.1-1.16.28-1.7V4.96H.96A8.997 8.997 0 000 9c0 1.45.35 2.83.96 4.04l3.01-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
      <div class="denied-box" id="deniedBox">
        Signed in, but this account doesn't have admin access to this gallery. Sign out and try a different account, or check that your UID is listed in the Firestore Security Rules.
      </div>
    </div>
  </div>

  <div id="adminView" hidden>
    <div class="user-bar">
      <span id="userEmail"></span>
      <button class="signout" id="signOutBtn">Sign out</button>
    </div>

    <div id="subsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCO7DtGmr80FVgiUt3DUCl-PLF58MNk160",
    authDomain: "chatsong-track-gallery.firebaseapp.com",
    projectId: "chatsong-track-gallery",
    storageBucket: "chatsong-track-gallery.firebasestorage.app",
    messagingSenderId: "800320909638",
    appId: "1:800320909638:web:36cb0f043699c5ef767547"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const signinView = document.getElementById('signinView');
  const adminView = document.getElementById('adminView');
  const deniedBox = document.getElementById('deniedBox');
  const subsList = document.getElementById('subsList');

  document.getElementById('googleSignIn').addEventListener('click', async () => {
    deniedBox.style.display = 'none';
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      console.error('Sign-in failed:', err);
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));

  let unsubscribeSubs = null;

  onAuthStateChanged(auth, (user) => {
    if (unsubscribeSubs) { unsubscribeSubs(); unsubscribeSubs = null; }

    if (!user) {
      signinView.hidden = false;
      adminView.hidden = true;
      return;
    }

    document.getElementById('userEmail').textContent = user.email;

    const subsQuery = query(collection(db, 'submissions'), orderBy('createdAt', 'desc'));
    unsubscribeSubs = onSnapshot(subsQuery,
      (snapshot) => {
        signinView.hidden = true;
        adminView.hidden = false;
        renderSubs(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
      },
      (err) => {
        console.error('Access check failed:', err);
        signinView.hidden = false;
        adminView.hidden = true;
        deniedBox.style.display = 'block';
      }
    );
  });

  function detectPlatform(url){
    if (!url) return 'Link';
    if (url.includes('spotify')) return 'Spotify';
    if (url.includes('soundcloud')) return 'SoundCloud';
    if (url.includes('bandcamp')) return 'Bandcamp';
    if (url.includes('music.apple')) return 'Apple Music';
    if (url.includes('youtu')) return 'YouTube';
    return 'Link';
  }

  function renderSubs(subs){
    if (subs.length === 0){
      subsList.innerHTML = '<div class="empty-state">Nothing pending — all caught up.</div>';
      return;
    }

    subsList.innerHTML = '';
    subs.forEach(s => {
      const platform = detectPlatform(s.trackUrl);
      const card = document.createElement('div');
      card.className = 'sub-card';
      card.innerHTML = `
        <div class="artist">${escapeHtml(s.artist || 'Unknown artist')}</div>
        <div class="meta-line">track: <a href="${escapeAttr(s.trackUrl)}" target="_blank" rel="noopener">${escapeHtml(s.trackUrl || '')}</a></div>
        <div class="meta-line">topic: <a href="${escapeAttr(s.topicUrl)}" target="_blank" rel="noopener">${escapeHtml(s.topicUrl || '')}</a></div>
        <div class="approve-fields">
          <input type="text" placeholder="Track title" class="f-title" value="">
          <select class="f-platform">
            ${['Spotify','SoundCloud','Bandcamp','Apple Music','YouTube','Link'].map(p =>
              `<option value="${p}" ${p === platform ? 'selected' : ''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="card-actions">
          <button class="btn-approve">✓ Approve</button>
          <button class="btn-reject">✕ Reject</button>
        </div>
      `;
      const approveBtn = card.querySelector('.btn-approve');
      approveBtn.addEventListener('click', async () => {
        const title = card.querySelector('.f-title').value.trim();
        if (!title){
          card.querySelector('.f-title').style.borderColor = 'var(--magenta)';
          return;
        }
        approveBtn.disabled = true;
        approveBtn.textContent = 'Approving…';
        try {
          await addDoc(collection(db, 'tracks'), {
            artist: s.artist,
            track: title,
            platform: card.querySelector('.f-platform').value,
            emoji: '🎵',
            likes: 0
          });
          await deleteDoc(doc(db, 'submissions', s.id));
          showToast(`Approved: ${s.artist} — ${title}`);
        } catch (err) {
          console.error('Approve failed:', err);
          approveBtn.disabled = false;
          approveBtn.textContent = '✓ Approve';
          showToast('Something went wrong — try again');
        }
      });

      card.querySelector('.btn-reject').addEventListener('click', async () => {
        if (!confirm(`Reject the submission from ${s.artist}?`)) return;
        try {
          await deleteDoc(doc(db, 'submissions', s.id));
          showToast(`Rejected: ${s.artist}`);
        } catch (err) {
          console.error('Reject failed:', err);
          showToast('Something went wrong — try again');
        }
      });

      subsList.appendChild(card);
    });
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2600);
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(str){ return escapeHtml(str); }
</script>
</body>
</html>
